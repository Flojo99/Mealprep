<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tagesansicht — Florian & Laura</title>
<style>
:root{--bg:#F7F6F2;--sur:#FFFFFF;--sur2:#F0EFE9;--bdr:#E2E0D8;--bdr2:#D0CEC4;--txt:#1A1A18;--txt2:#6B6960;--txt3:#9B9890;--blue:#1A5FA8;--blue-bg:#EBF2FB;--grn:#1A7A4A;--grn-bg:#E8F5EE;--amb:#92600A;--amb-bg:#FDF3E3;--fc:#1A5FA8;--lc:#8B4A00;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;--r:8px;--r2:12px}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:var(--font);background:var(--bg);color:var(--txt);line-height:1.5;padding:1rem}
.topbar{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.topbar button{padding:5px 12px;font-size:13px;border:1px solid var(--bdr2);border-radius:var(--r);background:var(--sur);color:var(--txt);cursor:pointer;font-family:var(--font)}
.topbar button:hover{background:var(--sur2)}
.topbar button.active{background:var(--blue-bg);color:var(--blue);border-color:var(--blue)}
.day-nav{display:flex;align-items:center;gap:8px;margin-left:auto}
.day-header{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:0.75rem}
.day-header span{font-size:26px;font-weight:600;color:var(--txt);min-width:200px;text-align:center}
.day-header button{padding:6px 14px;font-size:16px;border:1px solid var(--bdr2);border-radius:var(--r);background:var(--sur);color:var(--txt);cursor:pointer;font-family:var(--font)}
.day-header button:hover{background:var(--sur2)}
.day-nav span{font-size:22px;font-weight:600;min-width:140px;text-align:center}
.badge-tr{display:inline-block;font-size:11px;padding:2px 7px;border-radius:var(--r);background:var(--grn-bg);color:var(--grn);margin-left:5px}
.badge-re{display:inline-block;font-size:11px;padding:2px 7px;border-radius:var(--r);background:var(--sur2);color:var(--txt2);margin-left:5px}
.split{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start}
.split>div{min-width:0}
.col-header{display:flex;flex-direction:column;align-items:center;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bdr);text-align:center}
.col-name{font-size:20px;font-weight:600;text-align:center;display:block}
.col-name.f{color:var(--fc)}
.col-name.l{color:var(--lc)}
.col-meta{font-size:12px;color:var(--txt2);text-align:center}
.col-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.stat{background:var(--sur2);border-radius:var(--r);padding:8px 10px}
.stat-lbl{font-size:11px;color:var(--txt3);margin-bottom:2px}
.stat-val{font-size:18px;font-weight:600;color:var(--txt)}
.stat-sub{font-size:10px;color:var(--txt3);margin-top:1px}
.prog{height:3px;border-radius:2px;background:var(--bdr);margin-top:5px;overflow:hidden}
.prog-f{height:3px;border-radius:2px}
.section-lbl{font-size:13px;font-weight:600;color:var(--txt2);margin:10px 0 6px}
.meals{display:flex;flex-direction:column;gap:6px}
.mc{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r2);padding:9px 11px;cursor:pointer;transition:border-color .15s}
.mc:hover{border-color:var(--bdr2)}
.mc.hi-f{border-left:3px solid var(--fc)}
.mc.hi-l{border-left:3px solid var(--lc)}
.mc-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.mc-title{font-size:13px;font-weight:500;color:var(--txt)}
.mc-kcal{font-size:12px;color:var(--txt2);white-space:nowrap;margin-left:6px}
.mc-detail{font-size:11px;color:var(--txt2);line-height:1.6;margin-bottom:5px}
.mc-detail strong{color:var(--txt);font-weight:500}
.macs{display:flex;gap:4px;flex-wrap:wrap}
.mac{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--sur2);color:var(--txt2)}
.mac-p{background:var(--blue-bg);color:var(--blue)}
.mac-kh{background:var(--grn-bg);color:var(--grn)}
.frisch{margin-top:12px;padding:8px 12px;background:var(--amb-bg);border-radius:var(--r2);font-size:12px;color:var(--amb);line-height:1.7}
.frisch strong{font-weight:600}

.heute{background:var(--amb-bg);border-radius:var(--r2);padding:0.875rem 1rem;margin-bottom:1rem;font-size:1rem;color:var(--amb);line-height:1.9}
.heute strong{font-weight:600;font-size:1.05rem;color:#6B3A00}

.ov{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:200;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
.ov.open{display:flex}
.pp{background:var(--sur);border-radius:var(--r2);border:1px solid var(--bdr);width:100%;max-width:520px;padding:1.5rem;margin-top:1rem}
.pp-ttl{font-size:1.1rem;font-weight:600;margin-bottom:3px;color:var(--txt)}
.pp-sub{font-size:0.75rem;color:var(--txt2);margin-bottom:1rem}
.pp-mac{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:1rem}
.mb{background:var(--sur2);border-radius:var(--r);padding:8px;text-align:center}
.mv{font-size:1.1rem;font-weight:600;color:var(--txt)}
.ml2{font-size:0.65rem;color:var(--txt2)}
.pp-sec{font-size:0.72rem;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:0.07em;margin:1rem 0 0.4rem}
.ing-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:0.5rem}
.ing-i{font-size:0.8rem;padding:4px 8px;background:var(--sur2);border-radius:6px;color:var(--txt)}
.step{display:flex;gap:8px;margin-bottom:6px;font-size:0.85rem;line-height:1.5}
.snum{width:22px;height:22px;border-radius:50%;background:var(--sur2);display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:600;flex-shrink:0;margin-top:1px;color:var(--txt2)}
.tip-b{font-size:0.78rem;padding:8px 10px;background:var(--sur2);border-radius:6px;color:var(--txt2);margin-top:0.75rem}
.cls-btn{float:right;cursor:pointer;font-size:0.82rem;color:var(--txt2);padding:3px 10px;border:1px solid var(--bdr2);border-radius:5px;background:var(--sur);font-family:var(--font)}
.cls-btn:hover{background:var(--sur2)}
.port-b{font-size:0.85rem;padding:8px 10px;background:var(--grn-bg);border-radius:6px;color:var(--grn);margin-bottom:1rem}
</style>
</head>
<body>

<div class="day-header">
  <button onclick="changeDay(-1)">←</button>
  <span id="day-label"></span>
  <button onclick="changeDay(1)">→</button>
</div>
<div class="topbar">
  <button onclick="window.location.href='woche.html'">← Wochenübersicht</button>
  <button class="active">Tagesansicht</button>
</div>

<div class="heute" id="heute-box"></div>
<div class="split" id="split"></div>
<div class="frisch" id="frisch"></div>

<script>

  bolognese:["2000g Putenhack","400g rote Linsen","3 Dosen stückige Tomaten","80g Tomatenmark","400g Karotten","3 Zwiebeln","6 Knoblauchzehen","500ml Hühnerbrühe","Oregano, Chiliflocken, Salz, Pfeffer"],
  gulasch:["2500g Rindergulasch","1250g Zwiebeln","5 EL Paprikapulver edelsüß","5 EL Tomatenmark","2000g Rinderfond","7 EL Rotweinessig","Salz, Pfeffer, Petersilie"],
  curryhuhn:["2000g Hähnchenbrust","200g Tomatenmark","4 Karotten, 2 Paprika","2 TL Currypaste","250ml Kokosmilch","250ml Cremefine 7%","40g Walnüsse","50g Skyr"],
  stroganoff:["2000g Rindfleisch Hüfte","1000g Champignons","3 Zwiebeln","500ml Rinderfond","25g Worcestershire","20g Dijonsenf","120g Griech. Joghurt 2%"],
  butterchicken:["2500g Hähnchenbrust","5 Zwiebeln","1250g passierte Tomaten","500g Griech. Joghurt 2%","25g Butter","5 TL Garam Masala, Chili, Kreuzkümmel"],
  tikka:["2500g Hähnchenbrust","250g Joghurt (Marinade)","5 Zwiebeln","125g Ghee","1500g Dosentomaten","250ml Fond","125g Cremefine 7%"]
};
var TK_STEPS = {
  dahl:["Zwiebeln, Knoblauch, Ingwer 5 Min andünsten.","Gewürze 2 Min anrösten.","Hähnchen würfeln, anbraten.","Tomaten, Kokosmilch, Brühe, Linsen. 20 Min köcheln.","Spinat 2 Min. Portionieren + einfrieren."],
  bolognese:["Zwiebeln, Knoblauch, Karotten anbraten.","Tomatenmark rösten. Putenhack braten.","Tomaten, Brühe, Linsen, Gewürze. 25 Min köcheln.","Portionieren + einfrieren."],
  gulasch:["Ofen 180°C vorheizen.","Zwiebeln in Olivenöl 15 Min goldbraun.","Tomatenmark + Paprika anrösten. Fond + Essig ablöschen.","Fleisch rein. 2h 180°C, dann 1h 160°C.","Portionieren + einfrieren."],
  curryhuhn:["Tomatenmark + Currypaste anbraten.","Mit Kokos-Sahne ablöschen.","Hähnchen + Gemüse + Gewürze. 20 Min.","Skyr + Walnüsse einrühren."],
  stroganoff:["Fleisch scharf anbraten, herausnehmen.","Zwiebeln glasig. Champignons goldbraun.","Fond + Worcestershire + Senf.","Joghurt + Fleisch rein, kurz erwärmen."],
  butterchicken:["Zwiebel, Knoblauch, Ingwer andünsten.","Butter + Gewürze 3 Min.","Tomaten 3 Min aufkochen.","Hähnchen 15 Min. Joghurt einrühren."],
  tikka:["Abends: Marinade + Hähnchen einlegen.","Hähnchen anbraten. Beiseite.","Zwiebeln in Ghee. Gewürze + Tomaten + Fond 10 Min.","Hähnchen + Cremefine 10 Min. Portionieren."]
};
var TK_TIPS = {dahl:"Kocht sich nach Schritt 4 von selbst.",bolognese:"38g Protein — höchstes im Set.",gulasch:"Ofen macht die Arbeit.",curryhuhn:"Walnüsse statt Cashews.",stroganoff:"Joghurt statt Creme Fine.",butterchicken:"Joghurt statt Sahne.",tikka:"Marinade über Nacht."};
var TK_MAC = {dahl:{kc:290,p:35,f:8,k:18},bolognese:{kc:310,p:38,f:7,k:16},gulasch:{kc:245,p:30,f:10,k:7},curryhuhn:{kc:300,p:30,f:12,k:10},stroganoff:{kc:219,p:32,f:6,k:4},butterchicken:{kc:270,p:27,f:11,k:9},tikka:{kc:260,p:29,f:9,k:8}};
var TK_NAMES = {dahl:"Hähnchen-Kokos-Dahl",bolognese:"Turkey-Bolognese",gulasch:"Ofengulasch",curryhuhn:"Curryhuhn",stroganoff:"Stroganoff",butterchicken:"Butter Chicken",tikka:"Tikka Masala"};

function macBox(m){
  return '<div class="pp-mac">'+
    '<div class="mb"><div class="mv">'+m.kc+'</div><div class="ml2">kcal</div></div>'+
    '<div class="mb"><div class="mv">'+m.p+'g</div><div class="ml2">Protein</div></div>'+
    '<div class="mb"><div class="mv">'+m.f+'g</div><div class="ml2">Fett</div></div>'+
    '<div class="mb"><div class="mv">'+m.k+'g</div><div class="ml2">KH</div></div>'+
  '</div>';
}
function stepsHtml(steps){return steps.map(function(s,i){return '<div class="step"><div class="snum">'+(i+1)+'</div><div>'+s+'</div></div>';}).join('');}
function ingGrid(ing){return '<div class="ing-grid">'+ing.map(function(x){return '<div class="ing-i">'+x+'</div>';}).join('')+'</div>';}

function oRFr(id,wf){
  var r=REC[id];if(!r)return;
  var m={kc:Math.round(r.mac.kc*wf),p:Math.round(r.mac.p*wf),f:Math.round(r.mac.f*wf),k:Math.round(r.mac.k*wf)};
  document.getElementById("pp").innerHTML=
    '<button class="cls-btn" onclick="cR()">Schließen</button>'+
    '<div class="pp-ttl">'+r.name+'</div><div class="pp-sub">'+r.sub+'</div>'+
    macBox(m)+
    '<div class="pp-sec">Zutaten</div>'+ingGrid(r.ing)+
    '<div class="pp-sec">Zubereitung</div>'+stepsHtml(r.steps)+
    '<div class="tip-b">Tipp: '+r.tip+'</div>';
  document.getElementById("ov").classList.add("open");
}

function oRTK(id,portF,portL,pTarget){
  var m=TK_MAC[id];
  document.getElementById("pp").innerHTML=
    '<button class="cls-btn" onclick="cR()">Schließen</button>'+
    '<div class="pp-ttl">'+TK_NAMES[id]+'</div><div class="pp-sub">TK-Gericht · 20 Portionen</div>'+
    '<div class="port-b">Florian: <strong>'+portF+'g</strong> pro Portion ('+pTarget+'g P Ziel) &nbsp;·&nbsp; Laura: <strong>'+portL+'g</strong></div>'+
    macBox(m)+
    '<div class="pp-sec">Zutaten (20 Port.)</div>'+ingGrid(TK_ING[id])+
    '<div class="pp-sec">Zubereitung</div>'+stepsHtml(TK_STEPS[id])+
    '<div class="tip-b">Tipp: '+TK_TIPS[id]+'</div>';
  document.getElementById("ov").classList.add("open");
}

function oRAbend(name,ing,mac){
  document.getElementById("pp").innerHTML=
    '<button class="cls-btn" onclick="cR()">Schließen</button>'+
    '<div class="pp-ttl">'+name+'</div><div class="pp-sub">Florian · Abend</div>'+
    '<div class="pp-mac">'+
      '<div class="mb"><div class="mv">'+mac.kc+'</div><div class="ml2">kcal</div></div>'+
      '<div class="mb"><div class="mv">'+mac.p+'g</div><div class="ml2">Protein</div></div>'+
      '<div class="mb"><div class="mv">'+mac.f+'g</div><div class="ml2">Fett</div></div>'+
      '<div class="mb"><div class="mv" style="color:var(--blue)">'+mac.k+'g</div><div class="ml2">KH ✓</div></div>'+
    '</div>'+
    '<div class="pp-sec">Zutaten</div><div class="ing-grid">'+ing.split(' · ').map(function(x){return '<div class="ing-i">'+x+'</div>';}).join('')+'</div>';
  document.getElementById("ov").classList.add("open");
}

function cR(){document.getElementById("ov").classList.remove("open");}
function cib(e){if(e.target===document.getElementById("ov"))cR();}

var ST = {fKg:95, fKc:2900, lKg:62, lKc:1700, day:0};

var TK = {
  dahl:        {p:0.137, kc:1.14, name:"Hähnchen-Kokos-Dahl"},
  bolognese:   {p:0.155, kc:1.24, name:"Turkey-Bolognese"},
  gulasch:     {p:0.120, kc:0.98, name:"Ofengulasch"},
  curryhuhn:   {p:0.120, kc:1.20, name:"Curryhuhn"},
  stroganoff:  {p:0.128, kc:0.88, name:"Stroganoff"},
  butterchicken:{p:0.108,kc:1.08, name:"Butter Chicken"},
  tikka:       {p:0.116, kc:1.04, name:"Tikka Masala"}
};
var BK = {Reis:1.30, Nudeln:1.30, Kartoffeln:0.77};
var SLOTS_TR = {fr:0.22, m1:0.24, sh:0.18, m2:0.18, ab:0.18};
var SLOTS_RE = {fr:0.20, m1:0.20, sh:0.20, m2:0.20, ab:0.20};

var PLAN = [
  {tag:"Montag",    cls:"re", b:"Reis",       g1:"dahl",        g2:"butterchicken", fr:"porridge",    lOS:false},
  {tag:"Dienstag",  cls:"re", b:"Nudeln",     g1:"bolognese",   g2:"stroganoff",    fr:"ruehrei",     lOS:true},
  {tag:"Mittwoch",  cls:"tr", b:"Reis",       g1:"curryhuhn",   g2:"tikka",         fr:"porridge",    lOS:false},
  {tag:"Donnerstag",cls:"tr", b:"Kartoffeln", g1:"gulasch",     g2:"dahl",          fr:"ruehrei",     lOS:true},
  {tag:"Freitag",   cls:"tr", b:"Nudeln",     g1:"stroganoff",  g2:"bolognese",     fr:"pfannkuchen", lOS:true},
  {tag:"Samstag",   cls:"ko", b:"Reis",       g1:"tikka",       g2:"curryhuhn",     fr:"porridge",    lOS:false},
  {tag:"Sonntag",   cls:"tr", b:"Kartoffeln", g1:"gulasch",     g2:"butterchicken", fr:"pfannkuchen", lOS:true}
];

var FR_NAMES = {porridge:"Porridge + OS", ruehrei:"Rührei + Toast + OS", pfannkuchen:"Pfannkuchen + OS"};
var ABEND = [
  {name:"Skyr + Banane",                    ing:"300g Skyr · 120g Banane"},
  {name:"Griech. Joghurt + Haferflocken",   ing:"300g Joghurt · 40g Haferflocken · 15g Honig"},
  {name:"Körniger Frischkäse + Gemüse + Brot", ing:"200g Frischkäse · 100g Gemüse · 80g Brot"},
  {name:"Skyr + Beeren + Granola",          ing:"300g Skyr · 100g Beeren · 30g Granola"},
  {name:"Körniger Frischkäse + Apfel + Brot", ing:"200g Frischkäse · 120g Apfel · 80g Brot"},
  {name:"Griech. Joghurt + Müsli + Beeren", ing:"300g Joghurt · 40g Müsli · 80g Beeren"},
  {name:"Skyr + Apfel + Zimt",              ing:"300g Skyr · 120g Apfel · Zimt"}
];
var LAURA_ABEND = [
  {name:"Körniger Frischkäse + Gemüse",     ing:"150g Frischkäse · 100g Gurke/Paprika"},
  {name:"Magerquark + Beeren",              ing:"200g Magerquark · 80g Beeren"},
  {name:"Hartgekochte Eier",                ing:"2 Eier"},
  {name:"Körniger Frischkäse + Gemüse",     ing:"150g Frischkäse · 100g Gurke/Paprika"},
  {name:"Magerquark + Beeren",              ing:"200g Magerquark · 80g Beeren"},
  {name:"Skyr + Beeren + Granola",          ing:"150g Skyr · 80g Beeren · 20g Granola"},
  {name:"Hartgekochte Eier",                ing:"2 Eier"}
];

// Frühstücks-Makros (bei 95kg)
var FR_MAC = {
  porridge:   {kc:480, p:40, f:14, k:55},
  ruehrei:    {kc:420, p:42, f:12, k:18},
  pfannkuchen:{kc:538, p:54, f:10, k:56}
};
var FR_MAC_L = {
  porridge:   {kc:350, p:30, f:7,  k:28},
  ruehrei:    {kc:240, p:27, f:6,  k:10},
  pfannkuchen:{kc:270, p:27, f:5,  k:14}
};
var OSkc = 88;

function pSlot(kg){return Math.max(30, Math.round(kg*2/5));}
function tkG(id, ps){return Math.round(ps/TK[id].p);}
function tkKc(id, ps){return Math.round(tkG(id,ps)*TK[id].kc);}
function tkP(id, ps){return Math.round(tkG(id,ps)*TK[id].p);}
function beiG(slotKc, tkKc, b){return Math.max(0,Math.round((slotKc-tkKc)/BK[b]));}
function beiKc(slotKc, tkKc, b){var g=beiG(slotKc,tkKc,b);return tkKc+Math.round(g*BK[b]);}

function mac(arr){
  return '<div class="macs">'+arr.map(function(m){return '<span class="mac '+m[1]+'">'+m[0]+'</span>';}).join('')+'</div>';
}

function render(){
  var p = PLAN[ST.day];
  var isTr = p.cls==="tr"||p.cls==="ko";
  var sl = isTr?SLOTS_TR:SLOTS_RE;
  var fKc = Math.round(isTr?ST.fKc*1.1:ST.fKc*0.9);
  var lKc = Math.round(isTr?ST.lKc*1.1:ST.lKc*0.9);
  var fPs = pSlot(ST.fKg), lPs = pSlot(ST.lKg);
  var wf = ST.fKg/95;

  // Florian Slots
  var fFrS = Math.round(fKc*sl.fr);
  var fM1S = Math.round(fKc*sl.m1);
  var fShS = Math.round(fKc*sl.sh);
  var fM2S = Math.round(fKc*sl.m2);
  var fAbS = fKc-fFrS-fM1S-fShS-fM2S;

  // Florian Frühstück
  var ffm = FR_MAC[p.fr];
  var fFrKc = Math.round(ffm.kc*wf) + (p.lOS?0:0) + OSkc; // OS immer F
  var fFrP  = Math.round(ffm.p*wf) + 1;

  // Florian M1
  var fTkG1 = tkG(p.g1, fPs);
  var fTkKc1 = tkKc(p.g1, fPs);
  var fBg1 = beiG(fM1S, fTkKc1, p.b);
  var fM1Kc = fTkKc1 + Math.round(fBg1*BK[p.b]);

  // Florian Shake
  var shKc = Math.round((30*wf*4) + (40*wf*4));
  var shP  = Math.round(30*wf);

  // Florian M2
  var fTkG2 = tkG(p.g2, fPs);
  var fTkKc2 = tkKc(p.g2, fPs);
  var fBg2 = beiG(fM2S, fTkKc2, p.b);
  var fM2Kc = fTkKc2 + Math.round(fBg2*BK[p.b]);

  // Florian Abend
  var abF = ABEND[ST.day];

  // Florian Total
  var fTot = fFrKc + fM1Kc + shKc + fM2Kc + fAbS;
  var fP   = fFrP + fPs + shP + fPs + Math.round(fAbS*0.1);

  // Laura
  var lS = Math.round(lKc/5);
  var lTkG1 = Math.round(tkG(p.g1, lPs)*0.75);
  var lTkKc1 = Math.round(lTkG1*TK[p.g1].kc);
  var lBg1 = beiG(lS, lTkKc1, p.b);
  var lM1Kc = lTkKc1 + Math.round(lBg1*BK[p.b]);
  var lTkG2 = Math.round(tkG(p.g2, lPs)*0.75);
  var lTkKc2 = Math.round(lTkG2*TK[p.g2].kc);
  var lBg2 = beiG(lS, lTkKc2, p.b);
  var lM2Kc = lTkKc2 + Math.round(lBg2*BK[p.b]);
  var lFrm = FR_MAC_L[p.fr];
  var lFrKc = lFrm.kc + (p.lOS?OSkc:0);
  var lFrP  = lFrm.p  + (p.lOS?1:0);
  var lSnKc = lS;
  var lAbKc = Math.max(100, lKc-(lFrKc+lM1Kc+lSnKc+lM2Kc));
  var lTot  = lFrKc+lM1Kc+lSnKc+lM2Kc+lAbKc;
  var lPtot = lFrP + lPs + 15 + lPs + 18;
  var abL = LAURA_ABEND[ST.day];

  // Beilage frisch gesamt
  var beiGesF = fBg1+fBg2;
  var beiGesL = lBg1+lBg2;
  var beiRoh = Math.round((beiGesF+beiGesL)/2.5); // ca. Faktor gekocht→roh

  document.getElementById("day-label").innerHTML =
    p.tag + '<span class="badge-'+(isTr?"tr":"re")+'">'+(isTr?"Training":"Ruhe")+'</span>';

  var fPct = Math.min(100,Math.round(fTot/fKc*100));
  var lPct = Math.min(100,Math.round(lTot/lKc*100));
  var fPPct = Math.min(100,Math.round(fP/(ST.fKg*2)*100));
  var lPPct = Math.min(100,Math.round(lPtot/(ST.lKg*2)*100));

  function mealF(cls, time, title, detail, kcalVal, macArr, onclick){
    var oc = onclick ? ' onclick="'+onclick+'" style="cursor:pointer"' : '';
    return '<div class="mc '+cls+'"'+oc+'>'+
      '<div class="mc-top"><span class="mc-title">'+time+' — '+title+'</span><span class="mc-kcal">'+kcalVal+' kcal</span></div>'+
      '<div class="mc-detail">'+detail+'</div>'+
      mac(macArr)+
    '</div>';
  }

  var splitHtml =
    // Florian
    '<div>'+
    '<div class="col-header"><span class="col-name f">Florian</span><span class="col-meta">'+ST.fKg+'kg · '+fKc+' kcal</span></div>'+
    '<div class="col-stats">'+
      '<div class="stat"><div class="stat-lbl">Kalorien</div><div class="stat-val">'+fTot+'</div><div class="stat-sub">Ziel '+fKc+'</div><div class="prog"><div class="prog-f" style="width:'+fPct+'%;background:'+( fPct>95?"#1A7A4A":"#D08A10")+'"></div></div></div>'+
      '<div class="stat"><div class="stat-lbl">Protein</div><div class="stat-val">'+fP+'g</div><div class="stat-sub">Ziel '+(ST.fKg*2)+'g</div><div class="prog"><div class="prog-f" style="width:'+fPPct+'%;background:#1A5FA8"></div></div></div>'+
    '</div>'+
    '<div class="section-lbl">Mahlzeiten</div>'+
    '<div class="meals">'+
      mealF("mc hi-f","07:00",FR_NAMES[p.fr],"",fFrKc,[[""+fFrP+"g P","mac-p"],["14g F","mac"],["OS ✓","mac-kh"]],"oRFr('"+p.fr+"',"+wf+")")+
      mealF("mc hi-f","09:30","M1 nach Training","<strong>"+TK[p.g1].name+" "+fTkG1+"g</strong> + <strong>"+p.b+" "+fBg1+"g</strong>",fM1Kc,[[""+fPs+"g P","mac-p"],["9g F","mac"],[""+Math.round(fBg1*BK[p.b]/4)+"g KH","mac-kh"]],"oRTK('"+p.g1+"',"+fTkG1+","+Math.round(0)+","+fPs+")")+
      mealF("mc","12:30","Isoclear Shake + Zerealien",""+Math.round(30*wf)+"g Isoclear · "+Math.round(40*wf)+"g Zerealien",shKc,[[""+shP+"g P","mac-p"],["0g F","mac"],[""+Math.round(40*wf*0.85)+"g KH","mac-kh"]],"oRFr('shake',"+wf+")")+
      mealF("mc","15:30","M2","<strong>"+TK[p.g2].name+" "+fTkG2+"g</strong> + <strong>"+p.b+" "+fBg2+"g</strong>",fM2Kc,[[""+fPs+"g P","mac-p"],["9g F","mac"],[""+Math.round(fBg2*BK[p.b]/4)+"g KH","mac-kh"]],"oRTK('"+p.g2+"',"+fTkG2+",0,"+fPs+")")+
      mealF("mc","19:00","Abend — "+abF.name,abF.ing,fAbS,[["~"+Math.round(fAbS*0.1)+"g P","mac-p"],["3g F","mac"],["KH ✓","mac-kh"]],"oRAbend('"+abF.name+"','"+abF.ing+"',{kc:"+fAbS+",p:"+Math.round(0)+",f:3,k:20})")+
    '</div></div>'+

    // Laura
    '<div>'+
    '<div class="col-header"><span class="col-name l">Laura</span><span class="col-meta">'+ST.lKg+'kg · '+lKc+' kcal</span></div>'+
    '<div class="col-stats">'+
      '<div class="stat"><div class="stat-lbl">Kalorien</div><div class="stat-val">'+lTot+'</div><div class="stat-sub">Ziel '+lKc+'</div><div class="prog"><div class="prog-f" style="width:'+lPct+'%;background:'+( lPct>95?"#1A7A4A":"#D08A10")+'"></div></div></div>'+
      '<div class="stat"><div class="stat-lbl">Protein</div><div class="stat-val">'+lPtot+'g</div><div class="stat-sub">Ziel '+(ST.lKg*2)+'g</div><div class="prog"><div class="prog-f" style="width:'+lPPct+'%;background:#8B4A00"></div></div></div>'+
    '</div>'+
    '<div class="section-lbl">Mahlzeiten</div>'+
    '<div class="meals">'+
      mealF("mc hi-l","07:00",FR_NAMES[p.fr]+(p.lOS?"":" (kein OS)"),"Halbe Portion"+(p.lOS?" · OS":""),lFrKc,[[""+lFrP+"g P","mac-p"],["7g F","mac"],["28g KH","mac-kh"]])+
      mealF("mc hi-l","09:30","M1","<strong>"+TK[p.g1].name+" "+lTkG1+"g</strong> + <strong>"+p.b+" "+lBg1+"g</strong>",lM1Kc,[[""+lPs+"g P","mac-p"],["7g F","mac"],[""+Math.round(lBg1*BK[p.b]/4)+"g KH","mac-kh"]],"oRTK('"+p.g1+"',"+lTkG1+",0,"+lPs+")")+
      mealF("mc","12:30","Snack-Rotation","Täglich rotierend",lSnKc,[["~15g P","mac-p"],["3g F","mac"],["20g KH","mac-kh"]])+
      mealF("mc","15:30","M2","<strong>"+TK[p.g2].name+" "+lTkG2+"g</strong> + <strong>"+p.b+" "+lBg2+"g</strong>",lM2Kc,[[""+lPs+"g P","mac-p"],["7g F","mac"],[""+Math.round(lBg2*BK[p.b]/4)+"g KH","mac-kh"]],"oRTK('"+p.g2+"',"+lTkG2+",0,"+lPs+")")+
      mealF("mc","19:00","Abend — "+abL.name,abL.ing,lAbKc,[["~18g P","mac-p"],["4g F","mac"],["KH","mac-kh"]])+
    '</div></div>';

  document.getElementById("split").innerHTML = splitHtml;

  var osText = p.lOJ ? "OS für beide" : "OS nur für Florian";
  var kochText = p.kochtag ? " · <strong>Heute kochen!</strong>" : "";
  var beiGesF = fBg1+fBg2, beiGesL = lBg1+lBg2;
  var beiRoh = Math.round((beiGesF+beiGesL)/2.5);
  document.getElementById("heute-box").innerHTML =
    "<strong>Beilage kochen:</strong> "+p.b+" — F: "+beiGesF+"g · L: "+beiGesL+"g (ca. "+beiRoh+"g roh)<br>"+
    "<strong>Auftauen:</strong> "+TK[p.g1].name+" + "+TK[p.g2].name+kochText;

  document.getElementById("frisch").innerHTML =
    '<strong>Heute frisch:</strong> '+p.b+' kochen (F: '+beiGesF+'g · L: '+beiGesL+'g · ca. '+beiRoh+'g roh) · '+
    TK[p.g1].name+' + '+TK[p.g2].name+' aus TK auftauen · '+
    (p.lOS?'OS für beide · ':'OS nur für Florian · ')+
    (p.cls==="ko"?'<strong>Heute kochen!</strong> → Kochplan öffnen':'');
}

function changeDay(d){
  ST.day = (ST.day+d+7)%7;
  var _dow = new Date().getDay();
ST.day = _dow===0 ? 6 : _dow-1;
render();
}

render();
</script>
<div class="ov" id="ov" onclick="cib(event)"><div class="pp" id="pp"></div></div>
</body>
</html>
